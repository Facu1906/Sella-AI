<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo de Asistente de Ventas</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f7fa;
      --muted: #a0a6b0;
      --accent: #7c5cff;
      --accent-2: #ff7a59;
      --user: linear-gradient(135deg, #7c5cff, #9b7cff);
      --bot: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 10%, rgba(124, 92, 255, 0.18), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(255, 122, 89, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    #chat {
      width: min(430px, 100%);
      height: min(780px, calc(100vh - 40px));
      display: flex;
      flex-direction: column;
      border-radius: 30px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      position: relative;
    }

    #chat::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.04), transparent);
      pointer-events: none;
    }

    .header {
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1;
      flex: 0 0 auto;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 24px rgba(124, 92, 255, 0.35);
      flex-shrink: 0;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #39d98a;
      box-shadow: 0 0 10px rgba(57, 217, 138, 0.6);
    }

    #messages {
      flex: 1 1 auto;
      min-height: 0;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1;
    }

    #messages::-webkit-scrollbar {
      width: 8px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
    }

    .empty-state {
      margin: auto 0;
      text-align: center;
      color: var(--muted);
      padding: 20px;
    }

    .empty-state h2 {
      margin: 0 0 10px;
      font-size: 24px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .empty-state p {
      margin: 0;
      font-size: 15px;
      line-height: 1.6;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 18px;
    }

    .chip {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 92, 255, 0.45);
      background: rgba(124, 92, 255, 0.12);
    }

    .message-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-row.user-row {
      align-items: flex-end;
    }

    .message-row.bot-row {
      align-items: flex-start;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 18px;
      max-width: 76%;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      animation: fadeUp 0.18s ease;
    }

    .user {
      background: var(--user);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 10px 26px rgba(124, 92, 255, 0.25);
    }

    .bot {
      background: var(--bot);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.06);
      border-bottom-left-radius: 6px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    .typing {
      color: var(--muted);
      font-style: italic;
    }

    .time {
      font-size: 11px;
      color: var(--muted);
      padding: 0 6px;
    }

    #inputArea {
      padding: 14px;
      display: flex;
      align-items: stretch;
      gap: 10px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      z-index: 1;
      flex: 0 0 auto;
    }

    #input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 14px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    #input::placeholder {
      color: var(--muted);
    }

    #input:focus {
      border-color: rgba(124, 92, 255, 0.5);
      background: rgba(255,255,255,0.08);
    }

    button.send-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 24px rgba(124, 92, 255, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      flex: 0 0 auto;
      min-width: 88px;
    }

    button.send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(124, 92, 255, 0.45);
    }

    button.send-btn:active {
      transform: translateY(0);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      #chat {
        width: 100%;
        height: calc(100vh - 20px);
        border-radius: 22px;
      }

      .msg {
        max-width: 82%;
      }
    }
  </style>
</head>
<body>
  <div id="chat">
    <div class="header">
      <div class="avatar">AI</div>
      <div class="header-text">
        <div class="header-title">Asistente de Ventas</div>
        <div class="header-subtitle">
          <span class="dot"></span>
          Ejemplo para e-commerce
        </div>
      </div>
    </div>

    <div id="messages">
      <div class="empty-state" id="emptyState">
        <h2>Conversación guiada</h2>
        <p>
          Un ejemplo simple de cómo una tienda puede guiar a un cliente
          desde la primera consulta hasta la intención de compra.
        </p>
        <div class="quick-actions">
          <button class="chip" onclick="sendPreset('Necesito una campera')">Necesito una campera</button>
          <button class="chip" onclick="sendPreset('Hacen envíos?')">Hacen envíos?</button>
          <button class="chip" onclick="sendPreset('Quiero comprar')">Quiero comprar</button>
        </div>
      </div>
    </div>

    <div id="inputArea">
      <input id="input" placeholder="Escribí como cliente..." />
      <button class="send-btn" onclick="send()">Enviar</button>
    </div>
  </div>

  <script>
    function getTime() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function appendMessage(text, type, extraClass = "") {
      const messages = document.getElementById("messages");
      const emptyState = document.getElementById("emptyState");

      if (emptyState) {
        emptyState.remove();
      }

      const row = document.createElement("div");
      row.className = `message-row ${type === "user" ? "user-row" : "bot-row"}`;

      const bubble = document.createElement("div");
      bubble.className = `msg ${type} ${extraClass}`.trim();
      bubble.textContent = text;

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = getTime();

      row.appendChild(bubble);
      row.appendChild(time);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;

      return row;
    }

    function sendPreset(text) {
      const input = document.getElementById("input");
      input.value = text;
      send();
    }

    async function send() {
      const input = document.getElementById("input");
      const userText = input.value;
      if (!userText.trim()) return;

      appendMessage(userText, "user");
      input.value = "";

      const typingRow = appendMessage("Escribiendo...", "bot", "typing");

      try {
        const response = await fetch("https://ai-whatsapp-backend.onrender.com/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: userText })
        });

        const data = await response.json();
        typingRow.remove();

        setTimeout(() => {
          appendMessage(data.reply, "bot");
        }, 250);
      } catch (error) {
        typingRow.remove();
        appendMessage("Error conectando con el asistente.", "bot");
      }
    }

    document.getElementById("input").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
