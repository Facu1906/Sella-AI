<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo de Sistema de Ventas — Sella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./demo.css">
  <script src="./demo.js" defer></script>
</head>
<body>
  <div id="chat">
    <div class="header">
      <div class="avatar">
        <svg width="26" height="26" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 7C2 4.24 4.24 2 7 2H29C31.76 2 34 4.24 34 7V23C34 25.76 31.76 28 29 28H13L4 37V28C2.9 28 2 27.1 2 26V7Z" fill="url(#demoG)"/>
          <path d="M11 15L16 20L23 12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="45" cy="9"  r="8.5" fill="#7c8cff"/>
          <circle cx="45" cy="26" r="7"   fill="#5452b8"/>
          <circle cx="45" cy="41" r="5.5" fill="#221e54"/>
          <defs>
            <linearGradient id="demoG" x1="2" y1="2" x2="34" y2="37" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7c5cfc"/>
              <stop offset="1" stop-color="#5a40d8"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-text">
        <div class="header-title">Sella Sales</div>
        <div class="header-subtitle">
          <span class="dot"></span>
          Guided e-commerce demo
        </div>
      </div>
    </div>

    <div id="messages">
      <div class="empty-state" id="emptyState">
        <h2>How can I help?</h2>
        <p>
          This demo shows how a store turns a buying-intent question into a concrete
          recommendation and guides the customer to checkout.
        </p>
        <div class="quick-actions">
          <button class="chip" onclick="sendPreset('I want a winter jacket')">I want a winter jacket</button>
          <button class="chip" onclick="sendPreset('Do you ship?')">Do you ship?</button>
          <button class="chip" onclick="startDemo()">Start demo</button>
        </div>
      </div>
    </div>

    <div id="inputArea">
      <input id="input" placeholder="Escribí como cliente..." />
      <button class="send-btn" onclick="send()">Enviar</button>
    </div>
  </div>
</body>
</html>
